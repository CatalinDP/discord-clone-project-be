name: Backend CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./message-app-be

    steps:
    - name: Descargar codigo
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Instalar pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 11

    - name: Instalar dependencias
      run: pnpm install

    - name: Validar Linter y Formato
      run: pnpm run lint:fix

    - name: Verificar compilacion de TypeScript
      run: pnpm build